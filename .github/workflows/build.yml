name: Build Go compiler
on: [push]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - name: Prerequisites
      run: |
        sudo apt-get update
        sudo apt-get install -y binfmt-support qemu-user-static
    - name: Compile Go toolchain with make.bash
      run: |
        cd colonel/src ; ./make.bash
      # NOTE: we use make.bash (build only) rather than all.bash (build
      # + run stock Go's full test suite) because the cmd/go script
      # tests routinely time out under the free-tier GitHub runner
      # constraint (4 vCPU, 16GB) — they're not JanOS-related.  The
      # JanOS-specific test steps below cover our additions; the
      # tamago dist tests further down cover cross-arch soundness.
    - name: Run JanOS runtime tests (identity, sanitize, self, provenance, chain-verify)
      run: |
        GOROOT="$(pwd)/colonel" ./colonel/bin/go test -count=1 -timeout 300s \
          -run "TestIdentify|TestSpark|TestDerive|TestKDFSalt|TestHMACSHA256|TestHKDFExpand32|TestSelf|TestJanosSanitize|TestJanosVerifyChainSlot|TestJanosCanonicalHash|TestJanosProvenance|TestJanosP256|TestInstanceID" \
          ./colonel/src/runtime/
    - name: Run JanOS sync tests (Idempotent)
      run: |
        GOROOT="$(pwd)/colonel" ./colonel/bin/go test -count=1 -timeout 300s \
          -run "TestIdempotent" \
          ./colonel/src/sync/
    - name: Run JanOS genesis tests (Trait, Self, SparkAs)
      run: |
        GOROOT="$(pwd)/colonel" ./colonel/bin/go test -count=1 -timeout 300s \
          ./colonel/src/runtime/genesis/
    - name: Run JanOS attest tests (hardware-attestation detection)
      run: |
        GOROOT="$(pwd)/colonel" ./colonel/bin/go test -count=1 -timeout 120s \
          ./colonel/src/attest/
    - name: Run JanOS toolchain tests (signet, diviner, mockdiviner)
      run: |
        GOROOT="$(pwd)/colonel" ./colonel/bin/go test -count=1 -tags janos_signtest -timeout 120s \
          ./colonel/src/cmd/janos/...
    - name: Run Go distribution tests under tamago/amd64
      run: |
        GO_BUILDER_NAME=tamago GOOS=tamago GOARCH=amd64 ./colonel/bin/go tool dist test
    - name: Run Go distribution tests under tamago/arm
      run: |
        GO_BUILDER_NAME=tamago GOOS=tamago GOARCH=arm ./colonel/bin/go tool dist test
    - name: Run Go distribution tests under tamago/arm64
      run: |
        GO_BUILDER_NAME=tamago GOOS=tamago GOARCH=arm64 ./colonel/bin/go tool dist test
    - name: Run Go distribution tests under tamago/loong64
      run: |
        GO_BUILDER_NAME=tamago GOOS=tamago GOARCH=loong64 ./colonel/bin/go tool dist test
    - name: Run Go distribution tests under tamago/riscv64
      run: |
        GO_BUILDER_NAME=tamago GOOS=tamago GOARCH=riscv64 ./colonel/bin/go tool dist test
