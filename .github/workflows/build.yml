name: Build Go compiler
on: [push]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - name: Prerequisites
      run: |
        sudo apt-get update
        sudo apt-get install -y binfmt-support qemu-user-static
    - name: Compile Go with all.bash
      run: |
        cd colonel/src ; ./all.bash
    - name: Run Go distribution tests under tamago/amd64
      run: |
        GO_BUILDER_NAME=tamago GOOS=tamago GOARCH=amd64 ./colonel/bin/go tool dist test
    - name: Run Go distribution tests under tamago/arm
      run: |
        GO_BUILDER_NAME=tamago GOOS=tamago GOARCH=arm ./colonel/bin/go tool dist test
    - name: Run Go distribution tests under tamago/arm64
      run: |
        GO_BUILDER_NAME=tamago GOOS=tamago GOARCH=arm64 ./colonel/bin/go tool dist test
    - name: Run Go distribution tests under tamago/loong64
      run: |
        GO_BUILDER_NAME=tamago GOOS=tamago GOARCH=loong64 ./colonel/bin/go tool dist test
    - name: Run Go distribution tests under tamago/riscv64
      run: |
        GO_BUILDER_NAME=tamago GOOS=tamago GOARCH=riscv64 ./colonel/bin/go tool dist test
